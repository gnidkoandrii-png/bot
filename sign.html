<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; font-family: sans-serif; touch-action: none; }
        h3 { margin-top: 20px; color: #333; text-align: center; }
        .canvas-container { background: white; border: 2px solid #ccc; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 10px; overflow: hidden; }
        canvas { display: block; touch-action: none; }
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { padding: 14px 28px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #clear { background: #ff4d4d; color: white; }
        #save { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h3>✍️ Поставте ваш підпис на екрані:</h3>
    
    <div class="canvas-container">
        <canvas id="sig-canvas" width="320" height="200"></canvas>
    </div>
    
    <div class="controls">
        <button id="clear">Очистити</button>
        <button id="save">Підписати</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let canvas = document.getElementById("sig-canvas");
        let ctx = canvas.getContext("2d");
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000000"; // Змінили на чорний (краще стискається)
        
        let drawing = false;
        
        function getPos(e) {
            let rect = canvas.getBoundingClientRect();
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        
        canvas.addEventListener("mousedown", (e) => { drawing = true; let pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
        canvas.addEventListener("mousemove", (e) => { if(drawing) { let pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } });
        canvas.addEventListener("mouseup", () => drawing = false);
        canvas.addEventListener("mouseleave", () => drawing = false);
        
        canvas.addEventListener("touchstart", (e) => { drawing = true; let pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("touchmove", (e) => { if(drawing) { let pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); } e.preventDefault(); }, {passive: false});
        canvas.addEventListener("touchend", () => drawing = false);
        
        document.getElementById("clear").addEventListener("click", () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
        
        document.getElementById("save").addEventListener("click", () => {
            let tempCanvas = document.createElement("canvas");
            let tCtx = tempCanvas.getContext("2d");

            // Функція для отримання картинки з потрібним масштабом
            function getCompressed(scale) {
                tempCanvas.width = canvas.width * scale;
                tempCanvas.height = canvas.height * scale;
                tCtx.fillStyle = "#ffffff"; 
                tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                tCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
                return tempCanvas.toDataURL("image/jpeg", 0.8);
            }

            // РОЗУМНЕ СТИСНЕННЯ
            let scale = 1.0; // Починаємо з 100% якості
            let dataUrl = getCompressed(scale);

            // Якщо не влазить в ліміт Телеграму, плавно зменшуємо масштаб
            while (dataUrl.length > 4000 && scale > 0.3) {
                scale -= 0.1;
                dataUrl = getCompressed(scale);
            }

            if (dataUrl.length > 4000) {
                alert("❌ Підпис занадто складний. Спробуйте простіше!");
            } else {
                tg.sendData(dataUrl); 
            }
        });
    </script>
</body>
</html>
