<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; font-family: sans-serif; touch-action: none; }
        h3 { margin-top: 20px; color: #333; text-align: center; }
        .canvas-container { background: white; border: 2px solid #ccc; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 10px; overflow: hidden; }
        canvas { display: block; touch-action: none; }
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { padding: 14px 28px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #clear { background: #ff4d4d; color: white; }
        #save { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h3>✍️ Поставте ваш підпис:</h3>
    
    <div class="canvas-container">
        <canvas id="sig-canvas" width="320" height="200"></canvas>
    </div>
    
    <div class="controls">
        <button id="clear">Очистити</button>
        <button id="save">Підписати</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let canvas = document.getElementById("sig-canvas");
        let ctx = canvas.getContext("2d");
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000000";
        
        let drawing = false;
        let hasDrawing = false;
        
        // Змінні для відстеження меж (щоб обрізати білий фон)
        let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;

        function updateBounds(x, y) {
            hasDrawing = true;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
        }

        function getPos(e) {
            let rect = canvas.getBoundingClientRect();
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        
        function startDraw(e) { drawing = true; let pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); updateBounds(pos.x, pos.y); }
        function moveDraw(e) { if(drawing) { let pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); updateBounds(pos.x, pos.y); } }
        function endDraw() { drawing = false; }

        canvas.addEventListener("mousedown", startDraw);
        canvas.addEventListener("mousemove", moveDraw);
        canvas.addEventListener("mouseup", endDraw);
        canvas.addEventListener("mouseleave", endDraw);
        
        canvas.addEventListener("touchstart", (e) => { startDraw(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("touchmove", (e) => { moveDraw(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("touchend", endDraw);
        
        document.getElementById("clear").addEventListener("click", () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            minX = canvas.width; maxX = 0; minY = canvas.height; maxY = 0;
            hasDrawing = false;
        });
        
        document.getElementById("save").addEventListener("click", () => {
            if (!hasDrawing) {
                alert("Спочатку розпишіться!");
                return;
            }

            // Додаємо маленькі рамки (відступи) по 10 пікселів
            let pad = 10;
            let cMinX = Math.max(0, minX - pad);
            let cMinY = Math.max(0, minY - pad);
            let cMaxX = Math.min(canvas.width, maxX + pad);
            let cMaxY = Math.min(canvas.height, maxY + pad);
            let cropW = cMaxX - cMinX;
            let cropH = cMaxY - cMinY;

            // Створюємо нове полотно ІДЕАЛЬНО по розміру підпису
            let tempCanvas = document.createElement("canvas");
            tempCanvas.width = cropW;
            tempCanvas.height = cropH;
            let tCtx = tempCanvas.getContext("2d");
            tCtx.fillStyle = "#ffffff"; 
            tCtx.fillRect(0, 0, cropW, cropH);
            // Копіюємо ТІЛЬКИ сам малюнок без зайвого фону
            tCtx.drawImage(canvas, cMinX, cMinY, cropW, cropH, 0, 0, cropW, cropH);

            // Тепер стискаємо його (завдяки обрізці якість буде 100%)
            let quality = 1.0;
            let dataUrl = tempCanvas.toDataURL("image/jpeg", quality);

            while (dataUrl.length > 4000 && quality > 0.3) {
                quality -= 0.1;
                dataUrl = tempCanvas.toDataURL("image/jpeg", quality);
            }

            // Відправляємо боту
            tg.sendData(dataUrl); 
        });
    </script>
</body>
</html>
